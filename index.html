<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b10;--bg2:#13151f;--card:#1a1d2b;--card-hover:#22263a;--border:#2a2e42;--text:#e8eaed;--text2:#8b90a5;--accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,.25);--success:#00b894;--danger:#e17055;--warning:#fdcb6e;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-sm:0 2px 8px rgba(0,0,0,.2);--font:'Vazirmatn',system-ui,sans-serif}
[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--card:#ffffff;--card-hover:#f5f6fa;--border:#e0e3e8;--text:#1a1d27;--text2:#5f6577;--shadow:0 4px 24px rgba(0,0,0,.06);--shadow-sm:0 2px 8px rgba(0,0,0,.04);--accent-glow:rgba(108,92,231,.12)}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg2);border-left:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;right:0;z-index:100;transition:transform .3s;backdrop-filter:blur(12px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.sidebar-header{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-header p{font-size:.75rem;color:var(--text2);margin-top:6px}
.nav-btn{display:flex;align-items:center;gap:12px;width:calc(100% - 20px);margin:2px 10px;padding:11px 14px;border:none;background:none;color:var(--text2);font:inherit;font-size:.88rem;border-radius:12px;cursor:pointer;transition:all .25s;text-align:right}
.nav-btn:hover{background:var(--accent-glow);color:var(--text);transform:translateX(-2px)}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;font-weight:600;box-shadow:0 4px 16px rgba(108,92,231,.35)}
.nav-btn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.nav-btn .icon{width:20px;text-align:center;font-size:1.1rem}
.main{flex:1;padding:28px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px}
.topbar h2{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{padding:10px 22px;border:none;border-radius:12px;font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;box-shadow:0 2px 12px rgba(108,92,231,.3)}.btn-primary:hover{box-shadow:0 4px 20px rgba(108,92,231,.45);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--success),#00d2a0);color:#fff;box-shadow:0 2px 12px rgba(0,184,148,.3)}.btn-success:hover{box-shadow:0 4px 20px rgba(0,184,148,.45);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,var(--danger),#f0825e);color:#fff;box-shadow:0 2px 12px rgba(225,112,85,.3)}.btn-danger:hover{box-shadow:0 4px 20px rgba(225,112,85,.45);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--accent-glow);color:var(--text);border-color:var(--accent)}
.btn-sm{padding:7px 16px;font-size:.8rem;border-radius:10px}
.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid var(--border);transition:all .3s}
.card:hover{box-shadow:var(--shadow),0 0 0 1px var(--accent-glow)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat-card{text-align:center;padding:20px;border:1px solid var(--border);transition:all .3s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.stat-card .val{font-size:1.9rem;font-weight:800;color:var(--accent);line-height:1.2}
.stat-card .lbl{font-size:.75rem;color:var(--text2);margin-top:6px}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.02em}
.badge-success{background:rgba(0,184,148,.15);color:var(--success);border:1px solid rgba(0,184,148,.2)}
.badge-danger{background:rgba(225,112,85,.15);color:var(--danger);border:1px solid rgba(225,112,85,.2)}
.badge-warning{background:rgba(253,203,110,.15);color:var(--warning);border:1px solid rgba(253,203,110,.2)}
.badge-accent{background:rgba(108,92,231,.15);color:var(--accent);border:1px solid rgba(108,92,231,.2)}
.input{width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font:inherit;font-size:.85rem;transition:all .25s}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:.85rem;min-width:600px}
th,td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
tr:hover td{background:var(--card-hover)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.review-card{max-width:500px;margin:0 auto;text-align:center;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;perspective:1000px}
.review-inner{width:100%;min-height:280px;position:relative;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.review-card.flipped .review-inner{transform:rotateY(180deg)}
.review-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;border-radius:var(--radius);background:var(--card);border:2px solid var(--border);box-shadow:var(--shadow)}
.review-back{transform:rotateY(180deg)}
.rating-bar{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.quiz-option{width:100%;text-align:center;padding:14px;font-size:1rem;word-break:break-word;min-height:48px;border-radius:12px;transition:all .25s}
.quiz-option:hover{transform:translateY(-1px)}
.quiz-option.correct{background:linear-gradient(135deg,var(--success),#00d2a0)!important;color:#fff!important;box-shadow:0 4px 16px rgba(0,184,148,.4)!important}
.quiz-option.wrong{background:linear-gradient(135deg,var(--danger),#f0825e)!important;color:#fff!important;box-shadow:0 4px 16px rgba(225,112,85,.4)!important}
.toast-container{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:14px 28px;border-radius:14px;color:#fff;font-size:.88rem;font-weight:500;pointer-events:auto;animation:slideIn .4s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.3);backdrop-filter:blur(8px)}
.toast-success{background:linear-gradient(135deg,var(--success),#00d2a0)}.toast-error{background:linear-gradient(135deg,var(--danger),#f0825e)}.toast-info{background:linear-gradient(135deg,var(--accent),#7c6cf0)}
@keyframes slideIn{from{opacity:0;transform:translateY(-16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:6px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.theme-toggle{background:none;border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
.theme-toggle:hover{background:var(--accent-glow);border-color:var(--accent);transform:rotate(30deg)}
.theme-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hamburger{background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:background .2s}
.hamburger:hover{background:var(--accent-glow)}
.hamburger:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sidebar:not(.open){transform:translateX(100%)}
.main.sidebar-open{margin-right:260px}
.main.sidebar-closed{margin-right:0}
@media(max-width:768px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.main{margin-right:0;padding:16px}.stat-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--radius);padding:28px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal h3{margin-bottom:18px;font-weight:700}
.tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:.7rem;background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;margin:2px}
.hidden{display:none!important}
.pdf-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px;background:var(--card);border-radius:var(--radius);margin-bottom:18px;border:1px solid var(--border)}
.pdf-toolbar .btn{padding:8px 14px;font-size:.8rem;border-radius:10px}
.pdf-page-info{color:var(--text2);font-size:.85rem;min-width:60px;text-align:center}
.pdf-zoom-info{color:var(--text2);font-size:.8rem;min-width:50px;text-align:center}
.pdf-body{display:flex;gap:12px;min-height:500px}
.pdf-sidebar{width:120px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:calc(100vh - 200px);padding:4px}
.pdf-thumb{border:2px solid var(--border);border-radius:10px;cursor:pointer;overflow:hidden;transition:all .25s;flex-shrink:0;min-height:60px;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.pdf-thumb:hover,.pdf-thumb.active{border-color:var(--accent);box-shadow:0 2px 12px var(--accent-glow);transform:scale(1.03)}
.pdf-thumb canvas{display:block;width:100%}
.pdf-thumb-label{text-align:center;font-size:.7rem;color:var(--text2);padding:4px}
.pdf-main{flex:1;overflow:auto;padding:10px;background:var(--bg2);border-radius:var(--radius);min-height:500px}
.pdf-page-wrap{position:relative;display:inline-block;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.25);line-height:0;transition:box-shadow .3s}
.pdf-page-wrap:hover{box-shadow:0 16px 50px rgba(0,0,0,.35)}
.pdf-page-wrap canvas{display:block}
.pdf-page-wrap .textLayer{position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;opacity:0;line-height:1.0;pointer-events:auto;-webkit-text-size-adjust:none;text-size-adjust:none}
.pdf-page-wrap .textLayer>span,.pdf-page-wrap .textLayer>br{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%;-webkit-tap-highlight-color:rgba(108,92,231,.3);z-index:1}
.pdf-page-wrap .textLayer .highlight{margin:-1px;padding:1px;background-color:rgba(180,0,180,.2);border-radius:2px}
.pdf-page-wrap .textLayer .highlight.appended{display:inline}
.pdf-page-wrap .textLayer .highlight.begin{border-radius:2px 0 0 2px}
.pdf-page-wrap .textLayer .highlight.end{border-radius:0 2px 2px 0}
.pdf-page-wrap .textLayer .highlight.middle{border-radius:0}
.pdf-page-wrap .textLayer ::selection{background:rgba(108,92,231,.4)}
.pdf-page-wrap .textLayer ::-moz-selection{background:rgba(108,92,231,.4)}
.pdf-page-wrap .textLayer span::selection,.pdf-page-wrap .textLayer br::selection{background:rgba(108,92,231,.4)}
.pdf-popup{position:fixed;z-index:300;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);display:none;max-width:300px;width:auto}
.pdf-popup.visible{display:block}
.pdf-popup .btn{margin:2px 0}
.pdf-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
@media(max-width:768px){.pdf-sidebar{display:none}.pdf-toolbar{gap:3px;padding:8px;flex-wrap:wrap}.pdf-toolbar .btn{padding:6px 10px;font-size:.75rem;min-width:36px;min-height:36px}.pdf-sep{display:none}.pdf-main{padding:4px}.pdf-page-info{font-size:.8rem}.pdf-zoom-info{font-size:.8rem}}
.pdf-trans-popup{position:fixed;z-index:310;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 12px 48px rgba(0,0,0,.5);display:none;max-width:380px;width:auto;max-height:70vh;overflow-y:auto;font-family:var(--font);direction:ltr;text-align:left;backdrop-filter:blur(12px)}
.pdf-trans-popup.visible{display:block}
.trans-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.trans-word{font-size:1.3rem;font-weight:700;color:var(--text)}
.trans-ipa{font-size:.85rem;color:var(--text2);margin-left:4px}
.trans-audio-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.85rem;display:inline-flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.trans-audio-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.1);box-shadow:0 2px 10px rgba(108,92,231,.35)}
.trans-divider{height:1px;background:var(--border);margin:10px 0}
.trans-persian{font-size:1.05rem;font-weight:600;color:var(--success);margin-bottom:8px;font-family:var(--font);direction:rtl;text-align:right}
.trans-pos{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent);margin-bottom:8px}
.trans-defs{margin-bottom:8px}
.trans-def-item{margin-bottom:6px;font-size:.85rem;color:var(--text);line-height:1.5}
.trans-def-item::before{content:'• ';color:var(--accent)}
.trans-examples{margin-bottom:8px}
.trans-example{font-size:.8rem;color:var(--text2);font-style:italic;margin-bottom:4px;padding-left:12px;border-left:2px solid var(--accent);line-height:1.5}
.trans-synonyms{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.trans-syn-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.trans-add-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;box-shadow:0 4px 16px rgba(108,92,231,.3)}
.trans-add-btn:hover{box-shadow:0 6px 24px rgba(108,92,231,.45);transform:translateY(-1px)}
.trans-add-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.trans-loading{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text2);font-size:.85rem}
.trans-spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:transSpin .7s linear infinite;margin-left:8px}
@keyframes transSpin{to{transform:rotate(360deg)}}
.trans-error{color:var(--danger);font-size:.85rem;padding:10px;text-align:center}
.trans-close{position:absolute;top:8px;left:10px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:4px;line-height:1}
.trans-close:hover{color:var(--danger)}
@media(max-width:768px){.pdf-trans-popup{max-width:calc(100vw - 32px);left:16px!important;right:16px!important}}
.import-steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;flex-wrap:wrap}
.import-step-dot{width:38px;height:38px;border-radius:50%;background:var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;transition:all .4s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.import-step-dot.active{background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;box-shadow:0 0 0 4px rgba(108,92,231,.25),0 4px 16px rgba(108,92,231,.35);transform:scale(1.1)}
.import-step-dot.done{background:linear-gradient(135deg,var(--success),#00d2a0);color:#fff;box-shadow:0 2px 8px rgba(0,184,148,.3)}
.import-step-line{width:32px;height:2px;background:var(--border);flex-shrink:0}
.import-step-line.done{background:var(--success)}
.import-step-label{font-size:.65rem;color:var(--text2);text-align:center;margin-top:4px;white-space:nowrap}
.import-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.import-stat{text-align:center;padding:14px 10px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);transition:all .3s}
.import-stat:hover{border-color:var(--accent);transform:translateY(-2px)}
.import-stat .val{font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1.2}
.import-stat .lbl{font-size:.7rem;color:var(--text2);margin-top:4px}
.import-filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.import-filter-bar label{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text2);cursor:pointer;transition:color .2s}
.import-filter-bar label:hover{color:var(--text)}
.import-filter-bar input[type="radio"]{accent-color:var(--accent);width:16px;height:16px}
.import-word-grid{max-height:400px;overflow-y:auto;display:grid;gap:4px;margin-bottom:16px}
.import-word-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;background:var(--bg);cursor:pointer;transition:all .2s;border:1px solid transparent}
.import-word-item:hover{border-color:var(--accent);background:var(--accent-glow)}
.import-word-item.existing{opacity:.5}
.import-word-item input[type="checkbox"]{accent-color:var(--accent)}
.import-review-wrap{max-height:450px;overflow-y:auto}
.import-review-table{width:100%;border-collapse:collapse;font-size:.85rem}
.import-review-table th{padding:8px 10px;text-align:right;border-bottom:2px solid var(--border);color:var(--text2);font-size:.75rem;position:sticky;top:0;background:var(--card)}
.import-review-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.import-review-table input[type="text"]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font:inherit;font-size:.85rem;transition:all .25s}
.import-review-table input[type="text"]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.import-review-table input[type="checkbox"]{accent-color:var(--accent)}
.import-progress-card{text-align:center;padding:48px 24px}

.heatmap-cell:hover{transform:scale(1.3);z-index:2}

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const MS_PER_DAY=86400000;
const PDF_DEFAULT_SCALE=1.5;
const PDF_THUMB_SCALE=0.2;

// ═══════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════
const LS_KEY='leitner_v2';
const LS_BACKUP_KEY='leitner_backup';
const SCHEMA_VERSION=3;
function defaultState(){return{words:[],longTerm:[],stats:{reviewed:0,correct:0,wrong:0,streak:0,xp:0,lastReviewDate:null,history:{}},categories:['پیش‌فرض'],settings:{theme:'dark',sourceLang:'en',targetLang:'fa',notifications:false,notificationTime:'09:00',sidebarLocked:false},_version:SCHEMA_VERSION}}
let S=loadState();

function sanitizeCard(c){
  return{id:String(c.id||uid()),word:String(c.word||'').trim(),translation:String(c.translation||'').trim(),ipa:String(c.ipa||'').trim(),category:String(c.category||'پیش‌فرض').trim(),favorite:!!c.favorite,context:String(c.context||'').trim(),
  box:Math.max(0,Math.min(10,Number(c.box)||0)),repetitions:Math.max(0,Number(c.repetitions)||0),interval:Math.max(1,Number(c.interval)||1),easeFactor:Math.max(1.3,Number(c.easeFactor)||2.5),
  addedDate:c.addedDate||new Date().toISOString(),nextReviewDate:c.nextReviewDate||null,lastReviewedAt:c.lastReviewedAt||null,
  // FSRS fields
  stability:Number(c.stability)||0,difficulty:Number(c.difficulty)||0,elapsedDays:Number(c.elapsedDays)||0,scheduledDays:Number(c.scheduledDays)||0,reps:Number(c.reps)||0,lapses:Number(c.lapses)||0,fsrsState:String(c.fsrsState||'new'),
  // Dictionary details
  definitions:Array.isArray(c.definitions)?c.definitions:[],examples:Array.isArray(c.examples)?c.examples:[],synonyms:Array.isArray(c.synonyms)?c.synonyms:[],partOfSpeech:String(c.partOfSpeech||'').trim(),audioUs:String(c.audioUs||'').trim(),audioBr:String(c.audioBr||'').trim()}
}

function loadState(){try{const d=localStorage.getItem(LS_KEY);if(!d)return defaultState();const p=JSON.parse(d);const s={...defaultState(),...p};s.words=(p.words||[]).map(sanitizeCard).filter(w=>w.word);s.longTerm=(p.longTerm||[]).map(sanitizeCard).filter(w=>w.word);s.stats={...defaultState().stats,...(p.stats||{})};if(Array.isArray(s.stats.history))s.stats.history={};s.settings={...defaultState().settings,...(p.settings||{})};return s}catch(e){return defaultState()}}

// ═══════════════════════════════════════════
// FSRS ALGORITHM (self-contained)
// ═══════════════════════════════════════════
const FSRS_W=[0.4,0.6,2.4,5.8,4.93,0.94,0.86,1.01,1.38,0.21,1.63,0.48,0.66];
const FSRS_RETENTION=0.9;
const FSRS_MAX_INTERVAL=365;

function fsrsPow(stability,graduation){return stability*Math.pow(FSRS_W[graduation-4],1)}
function fsrsDecay(stability){return Math.pow(stability,-FSRS_W[0])+1}
function fsrsRetrieveProbability(stability,elapsed){if(stability<=0)return 0;return Math.pow(1+elapsed/(FSRS_W[9]*stability),-FSRS_W[8])}
function fsrsInitialDifficulty(rating){return Math.min(Math.max(FSRS_W[4]-Math.exp(FSRS_W[5]*(rating-1))+1,1),10)}
function fsrsInitialStability(rating){return FSRS_W[rating-1]}

function fsrsNext(w,rating){
  // rating: 1=Again,2=Hard,3=Good,4=Easy
  const state=w.fsrsState||'new';
  const now=new Date();
  let newStability,newDifficulty,newInterval,newState,newLapses=w.lapses||0;

  if(state==='new'||state==='learning'){
    if(rating===1){
      newStability=FSRS_W[0];
      newDifficulty=fsrsInitialDifficulty(rating);
      newInterval=0;
      newState='learning';
      newLapses=w.lapses||0;
    }else if(rating===2){
      newStability=FSRS_W[1]*1.2;
      newDifficulty=fsrsInitialDifficulty(rating);
      newInterval=1;
      newState='review';
    }else if(rating===3){
      newStability=FSRS_W[2];
      newDifficulty=fsrsInitialDifficulty(rating);
      newInterval=1;
      newState='review';
    }else{
      newStability=FSRS_W[3];
      newDifficulty=fsrsInitialDifficulty(rating);
      newInterval=Math.round(FSRS_W[3]);
      newState='review';
    }
  }else if(state==='review'){
    const elapsed=w.elapsedDays||1;
    const retrievability=fsrsRetrieveProbability(w.stability,elapsed);
    newDifficulty=Math.min(Math.max(w.difficulty-FSRS_W[6]*(rating-3),1),10);

    if(rating===1){
      newLapses=(w.lapses||0)+1;
      newStability=FSRS_W[9]*Math.pow(w.difficulty,-FSRS_W[10])*(Math.pow(w.stability+1,FSRS_W[11])-1)*Math.exp(FSRS_W[12]*(1-retrievability));
      newInterval=1;
      newState='relearning';
    }else{
      const q=rating===2?0.9:rating===3?1:1.1;
      newStability=w.stability*(1+Math.exp(FSRS_W[7])*(11-newDifficulty)*Math.pow(w.stability,-FSRS_W[8])*(Math.exp(FSRS_W[10]*(1-retrievability))-1)*q);
      if(rating===2)newInterval=Math.max(1,Math.round(w.interval*1.2));
      else if(rating===3)newInterval=Math.max(1,Math.round(w.stability*FSRS_DECAY_COEFF));
      else newInterval=Math.max(1,Math.round(w.stability*FSRS_DECAY_COEFF*FSRS_W[3]/FSRS_W[2]));
      newState='review';
    }
  }else if(state==='relearning'){
    if(rating===1){
      newStability=FSRS_W[0];
      newInterval=0;
      newState='relearning';
    }else{
      newStability=w.stability||FSRS_W[0];
      newInterval=1;
      newState='review';
    }
  }else{
    newStability=FSRS_W[0];
    newDifficulty=fsrsInitialDifficulty(rating);
    newInterval=1;
    newState='learning';
  }

  newStability=Math.max(newStability,0.1);
  newInterval=Math.min(Math.max(Math.round(newInterval),0),FSRS_MAX_INTERVAL);
  if(newInterval===0)newInterval=1;

  w.stability=newStability;
  w.difficulty=newDifficulty;
  w.interval=newInterval;
  w.fsrsState=newState;
  w.lapses=newLapses;
  w.reps=(w.reps||0)+1;
  w.elapsedDays=0;
  w.scheduledDays=newInterval;
  w.nextReviewDate=new Date(now.getTime()+newInterval*MS_PER_DAY).toISOString();
  w.lastReviewedAt=now.toISOString();
  w.box=Math.min(10,Math.ceil(newStability/30));
  w.easeFactor=Math.max(1.3,3-newDifficulty/5);
  return w;
}
const FSRS_DECAY_COEFF=0.5;

function clampReviewValues(w){
  w.repetitions=Math.max(0,Number(w.repetitions)||0);
  w.interval=Math.max(1,Number(w.interval)||1);
  w.easeFactor=Math.max(1.3,Number(w.easeFactor)||2.5);
  w.box=Math.max(0,Math.min(10,Number(w.box)||0));
  if(w.nextReviewDate&&isNaN(new Date(w.nextReviewDate).getTime()))w.nextReviewDate=null;
  if(w.lastReviewedAt&&isNaN(new Date(w.lastReviewedAt).getTime()))w.lastReviewedAt=null;
  // Ensure FSRS fields exist
  if(w.stability===undefined)w.stability=0;
  if(w.difficulty===undefined)w.difficulty=0;
  if(w.fsrsState===undefined)w.fsrsState='new';
}

function sm2Legacy(w,q){
  clampReviewValues(w);
  const now=Date.now();
  if(q<3){w.repetitions=0;w.interval=1}
  else{w.repetitions++;if(w.repetitions===1)w.interval=1;else if(w.repetitions===2)w.interval=6;else w.interval=Math.round(w.interval*w.easeFactor)}
  w.easeFactor+=(0.1-(5-q)*(0.08+(5-q)*0.02));
  if(w.easeFactor<1.3)w.easeFactor=1.3;
  w.nextReviewDate=new Date(now+w.interval*MS_PER_DAY).toISOString();
  w.lastReviewedAt=new Date(now).toISOString();
  w.box=Math.min(10,w.repetitions);
  return w}

// Map old 1-5 rating to FSRS 1-4
function mapRating(q){return q<=1?1:q<=3?2:q===4?3:4}

const DICT_API='https://api.dictionaryapi.dev/api/v2/entries/en';
const MYMEMORY_API='https://api.mymemory.translated.net/get';
const LANGUAGES={en:'English',fa:'فارسی',de:'Deutsch',fr:'Français',es:'Español',it:'Italiano',tr:'Türkçe',ar:'العربية',ru:'Русский',pt:'Português',zh:'中文',ja:'日本語',ko:'한국어'};

  if(!word||!window.speechSynthesis)return;

function decodeHtmlEntities(str){
  const el=document.createElement('textarea');
  el.innerHTML=str;return el.value}

async function fetchDictionary(word){
  try{
    const r=await fetch(DICT_API+'/'+encodeURIComponent(word),{headers:{Accept:'application/json'}});
    if(!r.ok)return null;
    const data=await r.json();
    if(!Array.isArray(data)||!data[0])return null;
    const e=data[0];
    const phonetics=Array.isArray(e.phonetics)?e.phonetics:[];
    const phoneticBr=phonetics.filter(p=>typeof p.audio==='string'&&/-uk\.mp3/i.test(p.audio)).map(p=>typeof p.text==='string'?p.text.trim():'').find(Boolean)||null;
    const phoneticUs=phonetics.filter(p=>typeof p.audio==='string'&&/-us\.mp3/i.test(p.audio)).map(p=>typeof p.text==='string'?p.text.trim():'').find(Boolean)||null;
    const audioBr=phonetics.filter(p=>typeof p.audio==='string'&&/-uk\.mp3/i.test(p.audio)).map(p=>p.audio).find(Boolean)||null;
    const audioUs=phonetics.filter(p=>typeof p.audio==='string'&&/-us\.mp3/i.test(p.audio)).map(p=>p.audio).find(Boolean)||null;
    const phonetic=phoneticBr||phoneticUs||phonetics.map(p=>typeof p.text==='string'?p.text.trim():'').find(Boolean)||null;
    const meanings=(Array.isArray(e.meanings)?e.meanings:[]).slice(0,4).map(m=>{
      const defs=(Array.isArray(m.definitions)?m.definitions:[]).slice(0,3).map(d=>typeof d.definition==='string'?d.definition.trim():'').filter(Boolean);
      const examples=(Array.isArray(m.definitions)?m.definitions:[]).slice(0,2).map(d=>typeof d.example==='string'?d.example.trim():'').filter(Boolean);
      const synonyms=[...(Array.isArray(m.synonyms)?m.synonyms:[]),...(Array.isArray(m.definitions)?m.definitions:[]).flatMap(d=>Array.isArray(d.synonyms)?d.synonyms:[])].filter((v,i,a)=>a.indexOf(v)===i).slice(0,4).filter(s=>typeof s==='string').map(s=>s.trim());
      return{partOfSpeech:m.partOfSpeech||'',definitions:defs,examples,synonyms}});
    return{headword:e.word||word,phonetic,phoneticBr,phoneticUs,audioBr,audioUs,meanings}
  }catch(e){return null}}

async function fetchTranslation(word,fromLang,toLang){
  try{
    const langpair=(fromLang||S.settings.sourceLang||'en')+'|'+(toLang||S.settings.targetLang||'fa');
    const r=await fetch(MYMEMORY_API+'?q='+encodeURIComponent(word)+'&langpair='+langpair);
    if(!r.ok)return null;
    const d=await r.json();
    if(d.responseData&&d.responseData.translatedText){
      let t=d.responseData.translatedText;
      if(t.toUpperCase()===word.toUpperCase())return null;
      return decodeHtmlEntities(t)}
    return null
  }catch(e){return null}}

const fetchPersianTranslation=(w)=>fetchTranslation(w);

// AUTO-BACKUP (IndexedDB)
// ═══════════════════════════════════════════
let backupDb=null;
function openBackupDb(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('leitner_backup_db',1);
    req.onupgradeneeded=()=>{req.result.createObjectStore('backups')};
    req.onsuccess=()=>{backupDb=req.result;resolve(req.result)};
    req.onerror=()=>reject(req.error)});
}
async function autoBackup(){
  try{
    const db=backupDb||await openBackupDb();
    const tx=db.transaction('backups','readwrite');
    tx.objectStore('backups').put(JSON.stringify(S),'latest');
  }catch(e){}
}
async function restoreBackup(){
  try{
    const db=backupDb||await openBackupDb();
    return new Promise(resolve=>{
      const tx=db.transaction('backups','readonly');
      const req=tx.objectStore('backups').get('latest');
      req.onsuccess=()=>{try{resolve(JSON.parse(req.result))}catch(e){resolve(null)}};
      req.onerror=()=>resolve(null)});
  }catch(e){return null}}
async function exportBackup(){
  try{
    const db=backupDb||await openBackupDb();
    return new Promise(resolve=>{
      const tx=db.transaction('backups','readonly');
      const req=tx.objectStore('backups').get('latest');
      req.onsuccess=()=>resolve(req.result||null);
      req.onerror=()=>resolve(null)});
  }catch(e){return null}}

let transPopupAbort=null;

function hideTransPopup(){
  if(transPopupAbort){transPopupAbort.abort();transPopupAbort=null}

function positionTransPopup(rect){
  const p=document.getElementById('transPopup');
  if(!p)return;
  p.style.display='block';
  let top=rect.bottom+12;
  let left=rect.left;
  const pw=380,ph=p.offsetHeight||300;
  if(left+pw>window.innerWidth-16)left=window.innerWidth-pw-16;
  if(left<16)left=16;
  if(top+ph>window.innerHeight-16){top=rect.top-ph-12}
  if(top<16)top=16;
  p.style.top=top+'px';p.style.left=left+'px'}

  let html='<button type="button" class="trans-close" id="transClose">&times;</button>';

  html+='<div class="trans-header">';

  html+='<button type="button" class="trans-audio-btn" data-speak="'+esc(displayWord)+'" title="Listen">🔊</button>';
  html+='</div>';

  if(persianResult)html+='<div class="trans-persian">'+esc(persianResult)+'</div>';

  html+='<div class="trans-divider"></div>';

  if(dictResult&&dictResult.meanings.length){
    dictResult.meanings.forEach(m=>{
      if(m.partOfSpeech)html+='<span class="trans-pos">'+esc(m.partOfSpeech)+'</span> ';
      if(m.definitions.length){html+='<div class="trans-defs">';m.definitions.forEach(d=>{html+='<div class="trans-def-item">'+esc(d)+'</div>'});html+='</div>'}
      if(m.examples.length){html+='<div class="trans-examples">';m.examples.forEach(ex=>{html+='<div class="trans-example">"'+esc(ex)+'"</div>'});html+='</div>'}
      if(m.synonyms.length){html+='<div class="trans-synonyms">';m.synonyms.forEach(s=>{html+='<span class="trans-syn-tag">'+esc(s)+'</span>'});html+='</div>'}
    });
  }else if(!persianResult)html+='<div class="trans-error">نتیجه‌ای یافت نشد. اتصال اینترنت را بررسی کنید.</div>';

  const cleanWord=displayWord.toLowerCase();

  html+='<button type="button" class="trans-add-btn" id="transAddBtn"'+(alreadyExists?' disabled':'')+'>';
  if(alreadyExists)html+='✅ در کتابخانه موجود است';

  document.getElementById('transClose').onclick=hideTransPopup;

  document.getElementById('transAddBtn').onclick=()=>{
    if(alreadyExists)return;
    const allDefs=dictResult?dictResult.meanings.flatMap(m=>m.definitions):[];
    const allExamples=dictResult?dictResult.meanings.flatMap(m=>m.examples):[];
    const allSynonyms=dictResult?dictResult.meanings.flatMap(m=>m.synonyms):[];

    save();

    const addBtn=document.getElementById('transAddBtn');
    if(addBtn){addBtn.disabled=true;addBtn.textContent='✅ در کتابخانه موجود است'}}
}

function rateReview(q){
if(reviewRatingPending)return;

const w=reviewSession.queue[reviewSession.idx];
const idx=S.words.findIndex(x=>x.id===w.id);
if(idx>=0)fsrsNext(S.words[idx],mapRating(q));
S.stats.reviewed++;S.stats.xp+={1:0,2:3,3:5,4:8,5:10}[q]||0;

const dk=todayKey();if(S.stats.lastReviewDate!==dk){if(S.stats.lastReviewDate===new Date(Date.now()-MS_PER_DAY).toISOString().slice(0,10))S.stats.streak++;else S.stats.streak=1;S.stats.lastReviewDate=dk}

lass="btn btn-ghost btn-sm" data-del="${w.id}" aria-label="حذف">🗑️</button><button type="button" class="btn btn-ghost btn-sm" data-lt="${w.id}" aria-label="انتقال به حافظه بلندمدت">🧠</button></td></tr>`}).join(''):'<tr><td colspan="6" class="empty">کلمه‌ای یافت نشد</td></tr>'}</tbody></table></div>`;

let importStep=0,importRawText='',importWords=[],importExisting=new Set(),importSelected=new Set(),importTranslations=[],importCategory='پیش‌فرض',importFilter='all',importTransProgress={done:0,total:0};
let textRenderedWords=[];
let translatedItems=[];
let selectedTextItems=[];

function parseWords(t){return[...new Set(t.toLowerCase().replace(/[^\w\s'-]/g,' ').split(/\s+/).filter(w=>w.length>=2&&!/^\d+$/.test(w)&&!/^[^a-z]+$/.test(w)))]}

function calcImportStats(){
const unique=[...new Set(importWords)];
const newW=unique.filter(w=>!importExisting.has(w));
return{total:importWords.length,unique:unique.length,existing:unique.length-newW.length,newCount:newW.length}}

function renderImportSteps(){
const labels=['ورود متن','انتخاب کلمات','ترجمه','عملیات'];
let h='<div class="import-steps">';
for(let i=0;i<4;i++){
const cls=i<importStep?'done':i===importStep?'active':'';
h+=`<div style="text-align:center"><div class="import-step-dot ${cls}">${i<importStep?'✓':i+1}</div><div class="import-step-label">${labels[i]}</div></div>`;
if(i<3)h+=`<div class="import-step-line${i<importStep?' done':''}"></div>`}
h+='</div>';return h}

function renderImport(c){
let h=renderImportSteps();
if(importStep===0)h+=renderImportStep0();
else if(importStep===1)h+=renderSelectableTextSection();
else if(importStep===2)h+=renderImportStep2();
else if(importStep===3)h+=renderTranslatedResults();
else if(importStep===4)h+=renderImportStep4();
c.innerHTML=h;bindImportEvents()}

function renderImportStep0(){
return`<div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:12px">ورود متن</h3><textarea class="input" id="importText" rows="6" placeholder="متن انگلیسی را اینجا بچسبانید...">${esc(importRawText)}</textarea><div class="flex" style="margin-top:12px"><select class="input" style="max-width:200px" id="importCat">${S.categories.map(c=>`<option${c===importCategory?' selected':''}>${esc(c)}</option>`).join('')}</select><button type="button" class="btn btn-primary" id="importParse">نمایش متن</button></div></div><div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:12px">ورود فایل</h3><div class="flex"><input type="file" id="fileInput" accept=".txt,.pdf,.docx,.json,.apkg" style="display:none"><button type="button" class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">انتخاب فایل</button><span style="color:var(--text2);font-size:.85rem">TXT, PDF, DOCX, JSON, Anki (.apkg)</span></div></div><div class="card"><h3 style="margin-bottom:12px">ورود از URL</h3><div class="flex"><input class="input" id="importUrl" placeholder="https://example.com/words.txt" style="max-width:400px"><button type="button" class="btn btn-ghost" id="importUrlBtn">دریافت</button></div></div>`}

}

  if(t.examples&&t.examples.length){h+=`<div style="font-size:.75rem;color:var(--text2);font-style:italic;padding-right:20px;border-right:2px solid var(--accent);padding-left:8px;margin-top:2px">${t.examples.slice(0,1).map(ex=>'"'+esc(ex)+'"').join(' ')}</div>`}
  h+=`</div>`;
});
h+=`<div class="sel-actions">`;

async function translateSelectedItems(){
const toTranslate=textRenderedWords.filter(w=>w.selected);
if(!toTranslate.length)return;
importStep=2;importTransProgress={done:0,total:toTranslate.length};
renderImport(document.getElementById('content'));
translatedItems=[];
for(let i=0;i<toTranslate.length;i+=5){
const batch=toTranslate.slice(i,i+5);
const results=await Promise.all(batch.map(async w=>{try{
const arr=await Promise.all([fetchTranslation(w.word),fetchDictionary(w.word)]);
const transResult=arr[0],dictResult=arr[1];
const allDefs=dictResult?dictResult.meanings.flatMap(m=>m.definitions):[];
const allExamples=dictResult?dictResult.meanings.flatMap(m=>m.examples):[];
const allSynonyms=dictResult?dictResult.meanings.flatMap(m=>m.synonyms):[];
const pos=dictResult&&dictResult.meanings[0]?dictResult.meanings[0].partOfSpeech:'';
return{id:uid(),text:w.word,translation:transResult||'',ipa:dictResult?(dictResult.phoneticBr||dictResult.phoneticUs||dictResult.phonetic||''):'',definitions:allDefs,examples:allExamples,synonyms:allSynonyms,partOfSpeech:pos,audioUs:dictResult?dictResult.audioUs||'':'',audioBr:dictResult?dictResult.audioBr||'':'',selected:true,moved:false,createdAt:new Date().toISOString()};
}catch(e){return{id:uid(),text:w.word,translation:'',selected:true,moved:false,createdAt:new Date().toISOString()}}}));
translatedItems.push(...results);
importTransProgress.done=Math.min(i+5,toTranslate.length);
renderImport(document.getElementById('content'))}
importStep=3;textRenderedWords.forEach(w=>w.selected=false);
renderImport(document.getElementById('content'));
toast(translatedItems.filter(t=>t.translation).length+' کلمه ترجمه شد','success')}

function moveSelectedToLeitner(){
const toAdd=translatedItems.filter(t=>t.selected&&t.translation&&!t.moved);
let added=0,skipped=0;
toAdd.forEach(t=>{
const exists=S.words.some(w=>w.word.toLowerCase()===t.text.toLowerCase())||S.longTerm.some(w=>w.word.toLowerCase()===t.text.toLowerCase());
if(exists){skipped++;t.moved=true;return}
S.words.push({id:uid(),word:t.text,translation:t.translation,ipa:t.ipa||'',category:importCategory,favorite:false,context:'',box:0,repetitions:0,interval:1,easeFactor:2.5,addedDate:new Date().toISOString(),nextReviewDate:null,lastReviewedAt:null,stability:0,difficulty:0,elapsedDays:0,scheduledDays:0,reps:0,lapses:0,fsrsState:'new',definitions:t.definitions||[],examples:t.examples||[],synonyms:t.synonyms||[],partOfSpeech:t.partOfSpeech||'',audioUs:t.audioUs||'',audioBr:t.audioBr||''});
t.moved=true;added++});
save();
renderImport(document.getElementById('content'));
if(added)toast(added+' کلمه به لایتنر ضمیمه شد','success');
if(skipped)toast(skipped+' کلمه تکراری بود','info')}

function moveSelectedToLongTermMemory(){
const toAdd=translatedItems.filter(t=>t.selected&&t.translation&&!t.moved);
let added=0,skipped=0;
toAdd.forEach(t=>{
const exists=S.words.some(w=>w.word.toLowerCase()===t.text.toLowerCase())||S.longTerm.some(w=>w.word.toLowerCase()===t.text.toLowerCase());
if(exists){skipped++;t.moved=true;return}
S.longTerm.push({id:uid(),word:t.text,translation:t.translation,ipa:t.ipa||'',category:importCategory,favorite:false,context:'',box:0,repetitions:0,interval:1,easeFactor:2.5,addedDate:new Date().toISOString(),nextReviewDate:null,lastReviewedAt:null,stability:0,difficulty:0,elapsedDays:0,scheduledDays:0,reps:0,lapses:0,fsrsState:'new',definitions:t.definitions||[],examples:t.examples||[],synonyms:t.synonyms||[],partOfSpeech:t.partOfSpeech||'',audioUs:t.audioUs||'',audioBr:t.audioBr||''});
t.moved=true;added++});
save();
renderImport(document.getElementById('content'));
if(added)toast(added+' کلمه به حافظه بلندمدت ضمیمه شد','success');
if(skipped)toast(skipped+' کلمه تکراری بود','info')}

function removeSelectedItems(){
translatedItems=translatedItems.filter(t=>!t.selected||t.moved);
if(!translatedItems.filter(t=>!t.moved).length){translatedItems=[];importStep=1;textRenderedWords.forEach(w=>w.selected=false)}
renderImport(document.getElementById('content'));
toast('حذف شد','success')}

function refreshSelectionActions(){
const activeItems=translatedItems.filter(t=>!t.moved);
const selCount=activeItems.filter(t=>t.selected).length;
['trAddLeitner','trAddLTM','trRemove'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=selCount===0})}

function bindImportEvents(){
if(importStep===0){
const ta=document.getElementById('importText');
if(ta)ta.oninput=()=>{importRawText=ta.value};
const btn=document.getElementById('importParse');
if(btn)btn.onclick=()=>{const txt=document.getElementById('importText').value;if(!txt.trim()){toast('متنی وارد نشده','error');return}importRawText=txt;importCategory=document.getElementById('importCat').value;textRenderedWords=parseWords(txt).map((w,i)=>({id:i,word:w,selected:false}));importStep=1;renderImport(document.getElementById('content'))};

if(fi)fi.onchange=handleFileImport;
const urlBtn=document.getElementById('importUrlBtn');
if(urlBtn)urlBtn.onclick=async()=>{const url=document.getElementById('importUrl')?.value?.trim();if(!url){toast('URL وارد نشده','error');return}try{toast('در حال دریافت...','info');const r=await fetch(url);if(!r.ok)throw new Error(r.status);const txt=await r.text();importRawText=txt;document.getElementById('importText').value=txt;textRenderedWords=parseWords(txt).map((w,i)=>({id:i,word:w,selected:false}));importStep=1;renderImport(document.getElementById('content'));toast('متن دریافت شد','success')}catch(e){toast('خطا در دریافت URL','error')}}}

document.querySelectorAll('.text-word').forEach(el=>{

});
const back=document.getElementById('tsBack');
if(back)back.onclick=()=>{importStep=0;renderImport(document.getElementById('content'))};

if(selAll)selAll.onclick=()=>{textRenderedWords.forEach(w=>w.selected=true);renderImport(document.getElementById('content'))};
const deselAll=document.getElementById('tsDeselectAll');
if(deselAll)deselAll.onclick=()=>{textRenderedWords.forEach(w=>w.selected=false);renderImport(document.getElementById('content'))};

});

document.querySelectorAll('[data-tid-trans]').forEach(inp=>{

});
const sa=document.getElementById('trSelAll');
if(sa)sa.onclick=()=>{translatedItems.filter(t=>!t.moved).forEach(t=>t.selected=true);renderImport(document.getElementById('content'))};
const da=document.getElementById('trDeselAll');
if(da)da.onclick=()=>{translatedItems.forEach(t=>t.selected=false);renderImport(document.getElementById('content'))};
const back=document.getElementById('trNewText');
if(back)back.onclick=()=>{importStep=0;importRawText='';textRenderedWords=[];translatedItems=[];selectedTextItems=[];renderImport(document.getElementById('content'))};
const addLeitner=document.getElementById('trAddLeitner');
if(addLeitner)addLeitner.onclick=()=>{moveSelectedToLeitner()};
const addLTM=document.getElementById('trAddLTM');
if(addLTM)addLTM.onclick=()=>{moveSelectedToLongTermMemory()};
const removeBtn=document.getElementById('trRemove');
if(removeBtn)removeBtn.onclick=()=>{removeSelectedItems()}}

  var translateTimer=null;
  input.oninput=function(){
    clearTimeout(translateTimer);
    var word=normalizeWordLookup(input.value);
    if(word&&word.length>=2){
      translateTimer=setTimeout(function(){doPdfTranslate(word)},400);
    }else{
      document.getElementById('pdfTranslateResult').innerHTML='<div style="text-align:center;color:var(--text2);font-size:.85rem;padding:20px 0">کلمه‌ای را جستجو کنید یا از متن کپی کنید</div>';
    }
  };

    if(e.key==='Enter'){
      clearTimeout(translateTimer);
      var word=normalizeWordLookup(input.value);
      if(word&&word.length>=2)doPdfTranslate(word);
    }

  };

    var word=normalizeWordLookup(input.value);
    if(word&&word.length>=2)doPdfTranslate(word);
  };

    });
  },100);
}

async function doPdfTranslate(word){
  var resultDiv=document.getElementById('pdfTranslateResult');
  if(!resultDiv)return;
  resultDiv.innerHTML='<div class="trans-loading"><div class="trans-spinner"></div>در حال جستجو...</div>';
  try{
    var [dictResult,persianResult]=await Promise.all([fetchDictionary(word),fetchTranslation(word)]);
    var html='';
    var displayWord=dictResult?dictResult.headword:word;
    var ipaText=dictResult?(dictResult.phoneticBr||dictResult.phoneticUs||dictResult.phonetic||''):'';
    // Word header with audio
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
    html+='<span style="font-size:1.2rem;font-weight:700;color:var(--text)">'+esc(displayWord)+'</span>';
    if(ipaText)html+='<span style="font-size:.85rem;color:var(--text2)">'+esc(ipaText)+'</span>';
    if(dictResult&&dictResult.audioUs)html+='<button type="button" class="trans-audio-btn" data-audio="'+esc(dictResult.audioUs)+'" title="American English">🇺🇸</button>';
    if(dictResult&&dictResult.audioBr)html+='<button type="button" class="trans-audio-btn" data-audio="'+esc(dictResult.audioBr)+'" title="British English">🇬🇧</button>';
    html+='<button type="button" class="trans-audio-btn" data-speak="'+esc(displayWord)+'" title="Listen">🔊</button>';
    html+='</div>';
    // Persian translation
    if(persianResult)html+='<div class="trans-persian">'+esc(persianResult)+'</div>';
    html+='<div class="trans-divider"></div>';
    // Definitions, examples, synonyms
    if(dictResult&&dictResult.meanings.length){
      dictResult.meanings.forEach(function(m){
        if(m.partOfSpeech)html+='<span class="trans-pos">'+esc(m.partOfSpeech)+'</span> ';
        if(m.definitions.length){html+='<div class="trans-defs">';m.definitions.forEach(function(d){html+='<div class="trans-def-item">'+esc(d)+'</div>'});html+='</div>'}
        if(m.examples.length){html+='<div class="trans-examples">';m.examples.forEach(function(ex){html+='<div class="trans-example">"'+esc(ex)+'"</div>'});html+='</div>'}
        if(m.synonyms.length){html+='<div class="trans-synonyms">';m.synonyms.forEach(function(s){html+='<span class="trans-syn-tag">'+esc(s)+'</span>'});html+='</div>'}
      });
    }else if(!persianResult)html+='<div style="text-align:center;color:var(--danger);font-size:.85rem;padding:10px">نتیجه‌ای یافت نشد</div>';
    // Add to Leitner button
    var cleanWord=displayWord.toLowerCase();
    var alreadyExists=S.words.some(function(w){return w.word.toLowerCase()===cleanWord})||S.longTerm.some(function(w){return w.word.toLowerCase()===cleanWord});
    html+='<button type="button" class="trans-add-btn" id="pdfTransAddBtn"'+(alreadyExists?' disabled':'')+'>';
    if(alreadyExists)html+='✅ در کتابخانه موجود است';
    else html+='＋ اضافه به لایتنر';
    html+='</button>';
    resultDiv.innerHTML=html;
    // Bind audio buttons
    resultDiv.querySelectorAll('[data-audio]').forEach(function(btn){btn.onclick=function(){playAudioUrl(btn.dataset.audio)}});
    resultDiv.querySelectorAll('[data-speak]').forEach(function(btn){btn.onclick=function(){speakWord(btn.dataset.speak)}});
    // Bind add to leitner
    var addBtn=document.getElementById('pdfTransAddBtn');
    if(addBtn&&!alreadyExists){
      addBtn.onclick=function(){
        var allDefs=dictResult?dictResult.meanings.flatMap(function(m){return m.definitions}):[];
        var allExamples=dictResult?dictResult.meanings.flatMap(function(m){return m.examples}):[];
        var allSynonyms=dictResult?dictResult.meanings.flatMap(function(m){return m.synonyms}):[];
        var pos=dictResult&&dictResult.meanings[0]?dictResult.meanings[0].partOfSpeech:'';
        S.words.push({id:uid(),word:displayWord,translation:persianResult||'',ipa:ipaText,category:'پیش‌فرض',favorite:false,context:'',box:0,repetitions:0,interval:1,easeFactor:2.5,addedDate:new Date().toISOString(),nextReviewDate:null,lastReviewedAt:null,stability:0,difficulty:0,elapsedDays:0,scheduledDays:0,reps:0,lapses:0,fsrsState:'new',definitions:allDefs,examples:allExamples,synonyms:allSynonyms,partOfSpeech:pos,audioUs:dictResult?dictResult.audioUs||'':'',audioBr:dictResult?dictResult.audioBr||'':''});
        save();
        addBtn.disabled=true;
        addBtn.textContent='✅ در کتابخانه موجود است';
        toast(displayWord+' به لایتنر اضافه شد','success');
      };
    }
  }catch(e){
    resultDiv.innerHTML='<div style="text-align:center;color:var(--danger);font-size:.85rem;padding:10px">خطا در جستجو</div>';
  }
}

:16px"><h3 style="margin-bottom:12px">پیش‌بینی ۱۴ روز آینده</h3><canvas id="forecastChart"></canvas></div>`;

weekChart=new Chart(document.getElementById('weekChart'),{type:'line',data:{labels:weekDays,datasets:[{data:weekData,borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,.2)',fill:true,tension:.4,pointRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:isDark?'#9aa0b0':'#5f6577'},grid:{display:false}},y:{ticks:{color:isDark?'#9aa0b0':'#5f6577'},grid:{color:isDark?'#333645':'#e0e3e8'}}}}});

function buildHeatmap(totalDays){
  let html='<div class="heatmap">';
  const now=new Date();
  for(let i=totalDays-1;i>=0;i--){
    const d=new Date(now.getTime()-i*MS_PER_DAY);
    const key=d.toISOString().slice(0,10);
    const count=(S.stats.history[key]||{}).reviewed||0;
    const level=count===0?0:count<=2?1:count<=5?2:count<=10?3:4;
    const tooltip=`${key}: ${count} مرور`;
    html+=`<div class="heatmap-cell heatmap-l${level}" data-count="${tooltip}" title="${tooltip}"></div>`;
  }
  html+='</div>';
  return html;
}

function buildForecast(days){
  const labels=[];
  const data=[];
  const now=new Date();
  for(let i=0;i<days;i++){
    const d=new Date(now.getTime()+i*MS_PER_DAY);
    const dateStr=d.toISOString().slice(0,10);
    const dayName=d.toLocaleDateString('fa-IR',{month:'short',day:'numeric'});
    labels.push(dayName);
    const count=S.words.filter(w=>w.nextReviewDate&&w.nextReviewDate.slice(0,10)===dateStr).length;
    data.push(count);
  }
  return{labels,data};
}

let quizState={card:null,options:[],answered:false,selected:-1,timer:null};
let quizCorrect=0,quizWrong=0;
let quizHistory=[];
let quizMode='mcq';// mcq, fill, reverse, listen

function renderQuiz(c){
const valid=S.words.filter(w=>w.translation&&w.translation.trim());
if(valid.length<4){if(quizState.timer){clearTimeout(quizState.timer);quizState.timer=null}c.innerHTML=`<div class="card" style="text-align:center;padding:60px"><div class="empty"><div class="icon">❓</div><p>برای آزمون حداقل ۴ کلمه با ترجمه لازم است</p><p style="color:var(--text2);font-size:.85rem;margin-top:8px">منبع فعلی: ${valid.length} کلمه معتبر</p></div></div>`;return}
if(!quizState.card)genQuiz();
const q=quizState.card;

// Quiz type selector
const typeBar=`<div class="quiz-type-bar"><button type="button" class="btn btn-sm ${quizMode==='mcq'?'btn-primary':''}" data-qmode="mcq">چندگزینه‌ای</button><button type="button" class="btn btn-sm ${quizMode==='fill'?'btn-primary':''}" data-qmode="fill">تکمیلی</button><button type="button" class="btn btn-sm ${quizMode==='reverse'?'btn-primary':''}" data-qmode="reverse">معکوس</button><button type="button" class="btn btn-sm ${quizMode==='listen'?'btn-primary':''}" data-qmode="listen">شنیداری</button></div>`;

let questionHtml='';
if(quizMode==='mcq'){
  questionHtml=`<div style="font-size:1.6rem;font-weight:700">${esc(q.word)}</div></div><div id="quizContainer" style="display:grid;gap:10px">${quizState.options.map((o,i)=>{let cls='btn btn-ghost quiz-option';let st='';if(quizState.answered){if(i===quizState.selected){cls+=o===q.translation?' correct':' wrong'}else if(o===q.translation){cls+=' correct';st='opacity:.7'}}return`<button type="button" class="${cls}" data-qi="${i}" style="justify-content:center;${st}" ${quizState.answered?'disabled':''}>${esc(o)}</button>`}).join('')}</div>`;
}else if(quizMode==='fill'){
  questionHtml=`<div style="font-size:1.6rem;font-weight:700;margin-bottom:16px">${esc(q.word)}</div><input type="text" class="quiz-input" id="quizFillInput" placeholder="ترجمه را تایپ کنید..." ${quizState.answered?'disabled':''}><div id="quizFillFeedback" style="margin-top:12px"></div></div>`;
}else if(quizMode==='reverse'){
  questionHtml=`<div style="font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:8px">${esc(q.translation)}</div><div style="font-size:.85rem;color:var(--text2);margin-bottom:16px">کدام کلمه انگلیسی است؟</div></div><div id="quizContainer" style="display:grid;gap:10px">${quizState.options.map((o,i)=>{let cls='btn btn-ghost quiz-option';let st='';if(quizState.answered){if(i===quizState.selected){cls+=o===q.word?' correct':' wrong'}else if(o===q.word){cls+=' correct';st='opacity:.7'}}return`<button type="button" class="${cls}" data-qi="${i}" style="justify-content:center;${st}" ${quizState.answered?'disabled':''}>${esc(o)}</button>`}).join('')}</div>`;
}else if(quizMode==='listen'){
  questionHtml=`<button type="button" class="btn btn-ghost" id="quizListenBtn" style="font-size:2rem;margin-bottom:16px">🔊</button><div style="font-size:.85rem;color:var(--text2);margin-bottom:16px">آنچه می‌شنوید را تایپ کنید</div><input type="text" class="quiz-input" id="quizFillInput" placeholder="کلمه را تایپ کنید..." ${quizState.answered?'disabled':''}><div id="quizFillFeedback" style="margin-top:12px"></div></div>`;
}

c.innerHTML=`<div style="max-width:500px;margin:0 auto"><div class="card" style="text-align:center;margin-bottom:16px;padding:16px"><div style="color:var(--text2);font-size:.85rem;margin-bottom:8px">${quizMode==='reverse'?'ترجمه کدام کلمه است؟':'ترجمه کدام گزینه درست است؟'}</div>${typeBar}<div class="card" style="text-align:center;padding:16px">${questionHtml}</div>${quizState.answered?`<div style="text-align:center;margin-top:12px"><button type="button" class="btn btn-primary" id="quizNext">سوال بعدی</button></div>`:''}<div style="text-align:center;margin-top:16px;color:var(--text2);font-size:.85rem">آمار: <span style="color:var(--success)">✓ ${quizCorrect}</span> / <span style="color:var(--danger)">✗ ${quizWrong}</span> | منبع: ${valid.length} کلمه</div></div>`;

if(quizState.answered){const nextBtn=document.getElementById('quizNext');if(nextBtn){nextBtn.onclick=()=>{if(quizState.timer){clearTimeout(quizState.timer);quizState.timer=null}genQuiz();renderQuiz(document.getElementById('content'));initQuiz()}}}

// Bind quiz type selector
c.querySelectorAll('[data-qmode]').forEach(btn=>{
  btn.onclick=()=>{quizMode=btn.dataset.qmode;quizState={card:null,options:[],answered:false,selected:-1,timer:null};renderQuiz(c);initQuiz()}});

// Fill-in-the-blank submit
if((quizMode==='fill'||quizMode==='listen')&&!quizState.answered){
  const input=document.getElementById('quizFillInput');
  if(input){input.focus();input.onkeydown=(e)=>{if(e.key==='Enter')checkFillAnswer()}}}

// Listen button
if(quizMode==='listen'){
  const listenBtn=document.getElementById('quizListenBtn');
  if(listenBtn&&!quizState.answered){listenBtn.onclick=()=>speakWord(q.word);setTimeout(()=>speakWord(q.word),100)}}
}
function checkFillAnswer(){
  if(quizState.answered)return;
  const input=document.getElementById('quizFillInput');
  if(!input)return;
  const answer=input.value.trim().toLowerCase();
  const correct=quizState.card.translation.toLowerCase();
  quizState.answered=true;
  quizCorrect++;quizWrong--;// will be re-counted below
  const isCorrect=answer===correct||quizState.card.word.toLowerCase()===answer;
  if(isCorrect){quizCorrect++;toast('درست! ✓','success')}
  else{quizWrong++;toast('نادرست! ✗','error')}
  const fb=document.getElementById('quizFillFeedback');
  if(fb)fb.innerHTML=isCorrect?`<div style="color:var(--success);font-weight:600">✓ درست</div>`:`<div style="color:var(--danger);font-weight:600">✗ پاسخ: ${esc(quizState.card.translation)}</div>`;
  input.disabled=true;
}

function genQuiz(){
if(quizState.timer){clearTimeout(quizState.timer);quizState.timer=null}
const valid=S.words.filter(w=>w.translation&&w.translation.trim());
const available=valid.filter(w=>!quizHistory.includes(w.id));
const pool=available.length>=4?available:valid;
const w=pool[Math.floor(Math.random()*pool.length)];

if(quizMode==='mcq'||quizMode==='reverse'){
  const opts=new Set();
  const target=quizMode==='reverse'?w.word:w.translation;
  opts.add(target);
  const distractors=S.words.filter(x=>x.id!==w.id&&x.translation&&x.translation.trim());
  const distractorField=quizMode==='reverse'?'word':'translation';
  const seen=new Set([target]);
  for(let i=0;i<3&&distractors.length;i++){const rIdx=Math.floor(Math.random()*distractors.length);const r=distractors.splice(rIdx,1)[0];const val=r[distractorField];if(!seen.has(val)){opts.add(val);seen.add(val)}}
  quizState={card:w,options:[...opts].sort(()=>Math.random()-.5),answered:false,selected:-1,timer:null};
}else{
  quizState={card:w,options:[],answered:false,selected:-1,timer:null};
}

quizHistory.push(w.id);if(quizHistory.length>20)quizHistory.shift();
}

function initQuiz(){
// Fix: recount correctly
if(quizMode==='fill'||quizMode==='listen')return;// handled by input events
const c=document.getElementById('quizContainer');
if(!c)return;
c.onclick=e=>{
const btn=e.target.closest('[data-qi]');
if(!btn||quizState.answered)return;
const idx=parseInt(btn.dataset.qi);
quizState.answered=true;
quizState.selected=idx;

let isCorrect;
if(quizMode==='reverse'){
  isCorrect=quizState.options[idx]===quizState.card.word;
}else{
  isCorrect=quizState.options[idx]===quizState.card.translation;
}
if(isCorrect){quizCorrect++;toast('درست! ✓','success')}else{quizWrong++;toast('نادرست! ✗','error')}
renderQuiz(document.getElementById('content'));
quizState.timer=setTimeout(()=>{genQuiz();renderQuiz(document.getElementById('content'));initQuiz()},1500)}}

// NOTIFICATION REMINDERS
// ═══════════════════════════════════════════
function checkNotifications(){
  if(!S.settings.notifications)return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const due=getDue();
  if(due.length===0)return;
  const now=new Date();
  const timeParts=(S.settings.notificationTime||'09:00').split(':');
  const notifHour=parseInt(timeParts[0])||9;
  const notifMin=parseInt(timeParts[1])||0;
  if(now.getHours()===notifHour&&Math.abs(now.getMinutes()-notifMin)<5){
    const lastNotif=localStorage.getItem('leitner_last_notif');
    if(lastNotif===todayKey())return;
    localStorage.setItem('leitner_last_notif',todayKey());
    new Notification('لایتنر - یادآوری مرور',{
      body:`${due.length} کلمه منتظر مرور شماست!`,
      icon:'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2720%27 fill=%27%236c5ce7%27/%3E%3Ctext x=%2750%27 y=%2768%27 text-anchor=%27middle%27 font-size=%2750%27 fill=%27white%27%3E📖%3C/text%3E%3C/svg%3E'
    })}
}

// Check every 5 minutes
setInterval(checkNotifications,5*60*1000);

// PWA & OFFLINE

if('serviceWorker' in navigator){
  try{
    const swCode=`const CACHE_NAME='leitner-v1';const ASSETS=['./leitner.html'];self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()))});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>{if(r)return r;return fetch(e.request).then(resp=>{if(resp&&resp.status===200&&resp.type==='basic'){const clone=resp.clone();caches.open(CACHE_NAME).then(c=>c.put(e.request,clone))}return resp}).catch(()=>caches.match('./leitner.html')))})});`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'./'}).catch(()=>{});
  }catch(e){}
}
